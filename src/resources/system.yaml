# this file contains the setup for special system variables
variables:
  HA_TEXT_ENTITY:
    type: mqtt
    topic: betabrite/sign/current_text
  HA_TIMER_ENTITY:
    type: timer
    topic: betabrite/timer_switch/command
    # show time remaining or timer complete
    template: >-
      {% if(value.running) %}
      {% set remaining = value.end_time - now() %}
      {% set total_seconds = remaining.total_seconds() | int %}
      {% if total_seconds > 0 %}
      {% set minutes = (total_seconds / 60) | int %}
      {% set hours = (minutes / 60) | int %}
      {{ "{:02d}".format(hours) }}:{{ "{:02d}".format(minutes) }}:{{ "{:02d}".format(((total_seconds % 60) % 60) | int) }}
      {% endif %}
      {% endif %}
    # update mqtt when timer has expired
    should_update_topic_template: >-
      {% if(value.running) %}
      {% set remaining = value.end_time - now() %}
      {% set total_seconds = remaining.total_seconds() | int %}
      {{ total_seconds <= 0 }}
      {% else %}
      False
      {% endif %}
    update_topic_template: >-
      {% set remaining = value.end_time - now() %}
      {% set total_seconds = remaining.total_seconds() | int %}
      {% if(value.running and total_seconds > 0) %}
      ON
      {% else %}
      OFF
      {% endif %}
    states:
      running: False
      timer:
        hours: 0
        minutes: 5
  HA_TIMER_EVENT_ENTITY:
    type: mqtt_push
    topic: betabrite/timer/event
    # update topic if previous value was timer.finished and at least 10 seconds have elapsed
    should_update_topic_template: >-
      {{ value == '' or (value.event_type == 'timer.finished' and value.timestamp + 10 < now().timestamp())}}
    update_topic_template: >-
      {"event_type": "timer.cleared"}
